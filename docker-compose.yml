services:
  backend:
    build: ./server
    ports:
      - "8080:8080"
    environment:
      - WEATHER_API_KEY=7f8eab7e7da63b1d81b39dea5677eab6

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost:8080
    ports:
      - "3000:3000"
    depends_on:
      - backend