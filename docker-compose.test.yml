services:
  backend:
    build: ./server
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - WEATHER_API_KEY=7f8eab7e7da63b1d81b39dea5677eab6
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8080/home || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - PORT=3000
      - REACT_APP_API_URL=http://backend:8080
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

  test-runner:
    image: alpine:3.20
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    volumes:
      - ./tests/docker-compose-test.sh:/tests/docker-compose-test.sh:ro
    entrypoint: ["sh", "/tests/docker-compose-test.sh"]
